{{- if eq .Values.deploymentMethod "deployment" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "plex-series-scheduler.fullname" . }}
  labels:
    {{- include "plex-series-scheduler.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "plex-series-scheduler.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.service.port }}
      targetPort: metrics
      protocol: TCP
{{- end }}
