deploymentMethod: cronjob

image:
  repository: ghcr.io/gregsharpe1/plex-series-scheduler
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

configFileName: config.yaml

config:
  plex:
    url: http://plex:32400
    token: ${PLEX_TOKEN}
  scheduler:
    interval: 30m
    guideLookahead: 168h
    maxRecordings: 1
    dryRun: true
    debug: false
  rules: []

plexTokenSecret:
  name: plex-series-scheduler
  key: plex-token

cronjob:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  startingDeadlineSeconds: null
  activeDeadlineSeconds: null
  backoffLimit: 1
  ttlSecondsAfterFinished: null

deployment:
  replicas: 1

service:
  type: ClusterIP
  port: 9464
  annotations: {}

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: ""
  path: /metrics
  labels: {}
  annotations: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraVolumeMounts: []
extraVolumes: []

extraManifests: []
